<svg fill="none" width="100%" height="300" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="display: block">
      <style>
        nav{
          width: 100%;
          height: 100px;
          background-color: red;
          color: white;
        }
        .repository{
          width: 100%;
          height: 100px;
          background-color:yellow;
          color: white;
        }
        .commit{
          width: 100%;
          height: 100px;
          background-color:green;
          color: white;
        }
      </style>
      <nav></nav>
      <section class="repository"></section>
      <section class="commit"></section>
    </div>
  </foreignObject>
</svg>
